<div 
  class="ivpt-content-row" 
  role="row"
  attr.aria-rowindex="{{rowIndex+2}}" 
  attr.row-index="{{rowIndex}}"
>
  @if (rowSelectionEnabled) {
    <div class="ivpt-content-cell" style="width: 36px;" role="gridcell">
      <div class="ivpt-row-select" role="presentation" style="width: inherit;">
        <input type="checkbox"
          class="ivpt-row-select-checkbox"
          tabindex="-1"
          name="dt_row_select"
          [checked]="rowData.dtSelected"
          (change)="whenRowSelected($event, rowData)"
        />
      </div>
    </div>
  }
  @for (colItem of columns; track colItem; let i=$index) {
    @if (colItem.visible) {
      <div 
        class="ivpt-content-cell" 
        [class.ivpt-cell-editable]="cellEditingEnabled && colItem.editable"
        [class.ivpt-cell-editing]="isCellEditing(colItem.field)"
        role="gridcell" 
        attr.aria-colindex="{{i+1}}" 
        [style.width.px]="colItem.width"
        (dblclick)="startCellEdit(colItem, $event)"
      >
        @if (isCellEditing(colItem.field)) {
          <presentable-cell-editor
            [value]="rowData[colItem.field]"
            [editorConfig]="colItem.editor || { type: 'text' }"
            [field]="colItem.field"
            (editComplete)="onCellEditComplete(colItem, $event)"
            (editCancel)="onCellEditCancel()"
          ></presentable-cell-editor>
        } @else {
          {{rowData[colItem.field]}}
        }
      </div>
    }  
  }
</div>
