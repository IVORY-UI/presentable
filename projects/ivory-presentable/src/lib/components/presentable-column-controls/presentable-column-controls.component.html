<div class="ivpt-column-controller">
  <button type="button" class="ivpt-column-controller-handle" (click)="openColumnControls()">
    Columns
  </button>

  <div
    class="ivpt-column-controller-modal"
    [ngStyle]="{'visibility': _showController ? 'visible' : 'hidden'}"
  >
    <div
      class="ivpt-column-select-container"
      (dragleave)="onListDragLeave($event)"
    >
      @for (colItem of draftColumns; track colItem; let i = $index) {
        @if (showDropSlotBefore(i)) {
          <div
            class="ivpt-column-drop-slot"
            role="region"
            aria-label="Drop column here"
            (dragover)="onDropSlotDragOver($event, i)"
            (drop)="onDropSlotDrop($event, i)"
          ></div>
        }
        <div
          class="ivpt-column-select-item"
          draggable="true"
          (dragstart)="onDragStart($event, colItem, i)"
          (dragenter)="onDragEnter($event, i)"
          (dragover)="onDragOver($event, i)"
          (drop)="onDrop($event)"
          (dragend)="onDragEnd($event)"
        >
          <span class="ivpt-column-drag-handle" aria-hidden="true" title="Drag to reorder"></span>
          <input
            type="checkbox"
            [id]="'ivpt-col-' + colItem.field"
            [attr.value]="colItem.field"
            [checked]="colItem.visible"
            (change)="toggleColumn(colItem)"
          />
          <label [for]="'ivpt-col-' + colItem.field">{{ colItem.title }}</label>
        </div>
      }
      @if (showDropSlotAfterLast()) {
        <div
          class="ivpt-column-drop-slot"
          role="region"
          aria-label="Drop column here"
          (dragover)="onDropSlotDragOver($event, draftColumns.length)"
          (drop)="onDropSlotDrop($event, draftColumns.length)"
        ></div>
      }
    </div>
    <div class="ivpt-column-controller-actions">
      <button type="button" class="ivpt-column-controller-handle" (click)="saveColumns()">
        Save
      </button>
    </div>
  </div>
</div>
