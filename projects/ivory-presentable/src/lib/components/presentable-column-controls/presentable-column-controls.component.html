<div class="ivpt-column-controller">
  <button class="ivpt-column-controller-handle" (click)="openColumnControls()">
    Columns
  </button>
  
  <div 
    class="ivpt-column-controller-modal"
    [ngStyle]="{'visibility': _showController ? 'visible' : 'hidden'}"
  >
    <div class="ivpt-column-select-container">
      @for (colItem of draftColumns; track colItem; let i=$index) {
        <div 
          class="ivpt-column-select-item" 
          [ngClass]="{'highlighted': isDraggingOver}"
          [style.top.rem]="(i * 2.4)"
          draggable="true"
          (dragstart)="onDragStart($event, colItem)"
          (dragover)="onDragOver($event)"
          (drop)="onDrop($event, i)"
        >
          <input 
            type="checkbox" 
            id="colItem.field" 
            value="colItem.field" 
            [checked]="colItem.visible"
            (change)="toggleColumn(colItem)"
          >
          <label for="colItem.field">{{colItem.title}}</label>
      </div>
      }
    </div>
    <div class="ivpt-column-controller-actions">
      <button class="ivpt-column-controller-handle" (click)="saveColumns()">
        Save
      </button>
    </div>
  </div>
</div>
